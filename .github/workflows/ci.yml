name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run abcgenbench validate-dataset fixtures/demo
      - run: uv run abcgenbench validate-dataset fixtures/eval
      - run: uv run abcgenbench validate-dataset fixtures/hidden_eval
      - run: uv run python -m unittest discover -s tests -v
